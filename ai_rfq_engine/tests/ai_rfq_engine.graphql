    $userId: String!,
    $requestId: String,
    $title: String,
    $description: String,
    $items: [JSON],
    $services: [JSON],
    $status: String,
    $daysUntilExpiration: Int,
    $updatedBy: String!
) {
    insertUpdateRequest(
        userId: $userId,
        requestId: $requestId,
        title: $title,
        description: $description,
        items: $items,
        services: $services,
        status: $status,
        daysUntilExpiration: $daysUntilExpiration,
        updatedBy: $updatedBy
    ) {
        request{
            ...RequestInfo
        }
    }
}

