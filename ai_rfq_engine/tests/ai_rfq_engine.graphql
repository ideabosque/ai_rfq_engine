fragment ServiceInfo on ServiceType {
    serviceType
    serviceId
    serviceName
    serviceDescription
    updatedBy
    createdAt
    updatedAt
}

fragment ServiceListInfo on ServiceListType {
    serviceList{
        ...ServiceInfo
    }
    pageSize
    pageNumber
    total
}

fragment ServiceProviderInfo on ServiceProviderType {
    service
    providerId
    serviceSpec
    uom
    basePricePerUom
    updatedBy
    createdAt
    updatedAt
}

fragment ServiceProviderListInfo on ServiceProviderListType {
    serviceProviderList{
        ...ServiceProviderInfo
    }
    pageSize
    pageNumber
    total
}

fragment ItemInfo on ItemType {
    itemType
    itemId
    itemName
    itemDescription
    updatedBy
    createdAt
    updatedAt
}

fragment ItemListInfo on ItemListType {
    itemList{
        ...ItemInfo
    }
    pageSize
    pageNumber
    total
}

fragment ProductInfo on ProductType {
    providerId
    productId
    sku
    productName
    productDescription
    uom
    basePricePerUom
    data
    updatedBy
    createdAt
    updatedAt
}

fragment ProductListInfo on ProductListType {
    productList{
        ...ProductInfo
    }
    pageSize
    pageNumber
    total
}

fragment RequestInfo on RequestType {
    customerId
    requestId
    title
    description
    items
    services
    status
    expiredAt
    updatedBy
    createdAt
    updatedAt
}

fragment RequestListInfo on RequestListType {
    requestList{
        ...RequestInfo
    }
    pageSize
    pageNumber
    total
}

fragment QuoteInfo on QuoteType {
    request
    quoteId
    providerId
    billingAddress
    shippingAddress
    shippingMethod
    shippingAmount
    totalAmount
    status
    updatedBy
    createdAt
    updatedAt
}

fragment QuoteListInfo on QuoteListType {
    quoteList{
        ...QuoteInfo
    }
    pageSize
    pageNumber
    total
}

fragment QuoteServiceInfo on QuoteServiceType {
    quoteId
    serviceProvider
    requestData
    data
    pricePerUom
    qty
    subtotal
    updatedBy
    createdAt
    updatedAt
}

fragment QuoteServiceListInfo on QuoteServiceListType {
    quoteServiceList{
        ...QuoteServiceInfo
    }
    pageSize
    pageNumber
    total
}

fragment QuoteItemProductInfo on QuoteItemProductType {
    quoteId
    item
    requestData
    product
    pricePerUom
    qty
    subtotal
    updatedBy
    createdAt
    updatedAt
}

fragment QuoteItemProductListInfo on QuoteItemProductListType {
    quoteItemProductList{
        ...QuoteItemProductInfo
    }
    pageSize
    pageNumber
    total
}

query ping {
    ping
}

query getService(
    $serviceType: String!,
    $serviceId: String!
) {
    service(
        serviceType: $serviceType,
        serviceId: $serviceId
    ) {
        ...ServiceInfo
    }
}

query getServiceList(
    $pageNumber: Int, 
    $limit: Int,
    $serviceType: String,
    $serviceName: String,
    $serviceDescription: String
) {
    serviceList(
        pageNumber: $pageNumber,
        limit: $limit,
        serviceType: $serviceType,
        serviceName: $serviceName,
        serviceDescription: $serviceDescription
    ) {
        ...ServiceListInfo
    }
}

mutation insertUpdateService(
    $serviceType: String!
    $serviceId: String,
    $serviceName: String,
    $serviceDescription: String,
    $updatedBy: String!
) {
    insertUpdateService(
        serviceType: $serviceType,
        serviceId: $serviceId,
        serviceName: $serviceName,
        serviceDescription: $serviceDescription,
        updatedBy: $updatedBy
    ) {
        service{
            ...ServiceInfo
        }
    }
}

mutation deleteService(
    $serviceType: String!,
    $serviceId: String!
) {
    deleteService(
        serviceType: $serviceType,
        serviceId: $serviceId
    ) {
        ok
    }
}

